[build]
  publish = "."

[[redirects]]
  from = "/tours"
  to = "/tour/"
  status = 301

[[redirects]]
  from = "/tour"
  to = "/tour/"
  status = 301

# Forest Park Picnics lives at its own domain now.
# force=true is required because /picnics/*/index.html still exist in the repo.
[[redirects]]
  from = "/picnic"
  to = "https://forestparkpicnics.com/"
  status = 301
  force = true

[[redirects]]
  from = "/picnic/*"
  to = "https://forestparkpicnics.com/"
  status = 301
  force = true

[[redirects]]
  from = "/picnics"
  to = "https://forestparkpicnics.com/"
  status = 301
  force = true

[[redirects]]
  from = "/picnics/*"
  to = "https://forestparkpicnics.com/"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"
